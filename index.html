<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCI-130 멀티 유저 분석 도구</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #4A90E2; --bg: #F4F7F9;
            --bar-high: #56a3ce; --bar-low: #e57373; --bar-mid: #a0a0a0;
        }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 1000px; width: 100%; padding-top: 60px; }
        
        /* 사용자 관리 바 */
        .user-manager { position: fixed; top: 0; left: 0; width: 100%; background: #333; color: white; padding: 10px 20px; display: flex; align-items: center; gap: 15px; z-index: 1100; box-shadow: 0 2px 5px rgba(0,0,0,0.2); box-sizing: border-box; }
        .user-select { padding: 5px 10px; border-radius: 5px; border: none; font-size: 0.9rem; min-width: 120px; }
        .user-btn { background: var(--primary); color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 0.85rem; font-weight: bold; }
        .user-btn.del { background: #e57373; }

        .progress-container { position: fixed; top: 45px; left: 0; width: 100%; height: 6px; background: #ddd; z-index: 1000; }
        #progressBar { height: 100%; width: 0%; background: var(--primary); transition: width 0.3s; }
        .progress-text { position: fixed; top: 55px; right: 20px; font-size: 0.8rem; font-weight: bold; color: var(--primary); background: white; padding: 2px 8px; border-radius: 10px; border: 1px solid #ddd; z-index: 1000; }

        .question-card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .q-text { font-size: 1.05rem; font-weight: 600; margin-bottom: 15px; }
        .options { display: flex; justify-content: space-between; gap: 5px; }
        .opt-item { flex: 1; text-align: center; }
        .opt-item input { display: none; }
        .opt-item label { display: block; background: #f0f2f5; padding: 10px 0; border-radius: 8px; cursor: pointer; font-size: 0.85rem; transition: 0.2s; }
        .opt-item input:checked + label { background: var(--primary); color: white; font-weight: bold; }

        #resultView { display: none; margin-top: 30px; }
        #captureArea { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); min-width: 900px; }
        
        h2 { border-left: 5px solid var(--primary); padding-left: 15px; margin-top: 40px; font-size: 1.4rem; color: #333; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 0.85rem; border-top: 2px solid #333; }
        th, td { border: 1px solid #eee; padding: 12px 8px; text-align: center; }
        th { background: #f8f9fa; font-weight: bold; }

        .main-bar-wrap { position: relative; width: 100%; height: 16px; background: #f0f0f0; border-radius: 4px; overflow: hidden; }
        .main-bar-fill { position: absolute; height: 100%; z-index: 1; transition: 1s; }

        .sub-graph-wrap { position: relative; width: 160px; height: 14px; background: #eee; border-radius: 7px; margin: 0 auto; overflow: hidden; border: 1px solid #ddd; }
        .sd-zone { position: absolute; left: 25%; width: 50%; height: 100%; background: #e3f2fd; }
        .dot { position: absolute; width: 8px; height: 8px; background: var(--primary); border-radius: 50%; top: 3px; transform: translateX(-50%); z-index: 3; transition: 1.5s ease-out; }
        .center-line { position: absolute; left: 50%; width: 1px; height: 100%; background: #ccc; z-index: 2; }

        .submit-btn, .save-btn, .reset-btn { width: 100%; padding: 18px; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .submit-btn { background: var(--primary); color: white; margin-top: 20px; }
        .save-btn { background: #333; color: white; }
        .reset-btn { background: #eee; color: #666; font-size: 0.8rem; padding: 10px; }
        
        .interpretation-box { background: #f9f9f9; padding: 20px; border-radius: 10px; font-size: 0.85rem; line-height: 1.6; color: #555; }
    </style>
</head>
<body>

<div class="user-manager">
    <span>검사자:</span>
    <select id="userSelector" class="user-select" onchange="switchUser()"></select>
    <button class="user-btn" onclick="addUser()">추가</button>
    <button class="user-btn del" onclick="deleteUser()">삭제</button>
</div>

<div class="progress-container"><div id="progressBar"></div></div>
<div class="progress-text" id="progressText">0/130</div>

<div class="container">
    <header style="text-align:center; margin-bottom:30px;">
        <h1>TCI-130 정밀 분석</h1>
        <p id="currentUserDisplay" style="font-weight: bold; color: var(--primary); font-size: 1.2rem;"></p>
        <button type="button" class="reset-btn" onclick="resetCurrentAnswers()">현재 사용자 응답 초기화</button>
    </header>

    <form id="tciForm">
        <div id="questionsContainer"></div>
        <button type="submit" class="submit-btn">결과 분석 리포트 생성 (미응답은 '2번' 자동 선택)</button>
    </form>

    <div id="resultView">
        <div id="captureArea">
            <h1 style="text-align:center; margin-bottom:10px;" id="resultTitle">TCI-130 분석 보고서</h1>
            <p style="text-align:center; color:#888; font-size:0.9rem;" id="reportDate"></p>
            
            <h2>1. 상위 척도 프로파일</h2>
            <table>
                <thead>
                    <tr><th>구분</th><th>척도명</th><th>원점수</th><th>T점수</th><th>백분위</th><th>그래프 (50% 기준)</th></tr>
                </thead>
                <tbody id="mainBody"></tbody>
            </table>

            <h2>2. 하위 척도 정밀 분석</h2>
            <table>
                <thead>
                    <tr><th>척도</th><th>하위척도</th><th>원점수</th><th>평균(SD)</th><th>낮음</th><th>분포 (-1SD ~ +1SD)</th><th>높음</th></tr>
                </thead>
                <tbody id="subBody"></tbody>
            </table>

            <div class="interpretation-box">
                <strong>[결과 해석 요약]</strong><br>
                • T점수 50은 한국인 평균치입니다. 하늘색 영역은 정상 범위를 의미합니다.
            </div>
        </div>
        <button class="save-btn" onclick="saveImage()">이미지 공유 및 저장</button>
    </div>
</div>

<script>
// (데이터 섹션: tciRawData, scaleMeta는 기존과 동일하므로 생략 없이 로직에 포함합니다)
const tciRawData = [
    { id: 1, text: "쉬운 일보다는 도전적인 일이 더 좋다.", cat: "NS", sub: "NS1", rev: false },
    { id: 2, text: "나를 좋게 대했던 사람들과도 친하게 지낸다.", cat: "RD", sub: "RD2", rev: false },
    { id: 3, text: "음악을 듣거나 산책을 할 때 그 속에 빠져들어 나 자신을 잊는다.", cat: "ST", sub: "ST1", rev: false },
    { id: 4, text: "종종 실제보다 일이 더 어렵거나 위험할 것이라고 예상한다.", cat: "HA", sub: "HA1", rev: false },
    { id: 5, text: "내가 할 수 있는 한 더 잘 하고 싶기 때문에, 열심을 다해 나 자신을 몰아붙인다.", cat: "P", sub: "PS1", rev: false },
    { id: 6, text: "주머니가 바닥날 때까지 돈을 쓰거나, 신용카드를 너무 많이 사용해서 빚을 지는 때가 있다.", cat: "NS", sub: "NS2", rev: false },
    { id: 7, text: "내가 가지고 있는 많은 습관들은 내가 가치 있는 목표를 달성하는 데 방해가 된다.", cat: "SD", sub: "SD1", rev: true },
    { id: 8, text: "문제가 생기면 혼자서 해결하려 한다.", cat: "CO", sub: "CO1", rev: true },
    { id: 9, text: "미래에 어떤 일이 잘못될까봐 자주 걱정한다.", cat: "HA", sub: "HA1", rev: false },
    { id: 10, text: "별로 힘들지 않고 하루 종일 활동할 수 있다.", cat: "HA", sub: "HA4", rev: true },
    { id: 11, text: "어려움에 처했거나 뭔가 필요한 사람이 있을 때 도움을 준다.", cat: "CO", sub: "CO3", rev: false },
    { id: 12, text: "처음 만난 사람과도 편안하게 대화하고 내 의견을 이야기할 수 있다.", cat: "HA", sub: "HA3", rev: true },
    { id: 13, text: "새로운 일에 마음이 쉽게 동해서 당장 시도해 보고 싶어진다.", cat: "NS", sub: "NS1", rev: false },
    { id: 14, text: "다른 아무것도 눈에 들어오지 않을 정도로 어떤 일에 몰입하여, 때로 딴 세계에 있는 듯 보일 때가 있다.", cat: "ST", sub: "ST1", rev: false },
    { id: 15, text: "종종 나 자신에게 불만을 느낀다.", cat: "SD", sub: "SD4", rev: true },
    { id: 16, text: "내 생각을 받아들이지 않는 사람들을 참아내기가 힘들다.", cat: "CO", sub: "CO1", rev: true },
    { id: 17, text: "낯선 사람을 만날 때, 매우 수줍어하며 위축된다.", cat: "HA", sub: "HA3", rev: false },
    { id: 18, text: "나의 야망과 열심 때문에 성공하는 때가 종종 있다.", cat: "P", sub: "PS3", rev: false },
    { id: 19, text: "나에게 잘못을 저지른 사람들을 쉽게 용서하는 편이다.", cat: "CO", sub: "CO4", rev: false },
    { id: 20, text: "다른 사람들과 거리를 두고 떨어져 지내는 것이 좋다.", cat: "RD", sub: "RD3", rev: true },
    { id: 21, text: "어떤 일을 할 때 과거에 어떻게 했는지는 생각하지 않고 현재의 느낌에 따라 행동한다.", cat: "NS", sub: "NS2", rev: false },
    { id: 22, text: "내게 안 좋은 일이 생기거나 내가 잘못을 하는 상상을 자주 한다.", cat: "HA", sub: "HA2", rev: false },
    { id: 23, text: "종교적이거나 영적인 경험이 내 인생의 바른 길을 찾는 데 도움을 주었다.", cat: "ST", sub: "ST3", rev: false },
    { id: 24, text: "때로 다른 사람을 약 오르게 하는 것이 재미있다.", cat: "CO", sub: "CO2", rev: true },
    { id: 25, text: "다른 사람들에 비해 더 완벽주의적이다.", cat: "P", sub: "PS4", rev: false },
    { id: 26, text: "고민이 있으면 친구에게 얘기하고 싶어 한다.", cat: "RD", sub: "RD3", rev: false },
    { id: 27, text: "의심이 많은 편이어서, 주변 사람들은 일이 다 잘 될 거라고 해도 어떤 일을 계속 진행하기가 두렵다.", cat: "HA", sub: "HA1", rev: false },
    { id: 28, text: "나에게 손해가 된다 해도 정직한 것이 더 좋다.", cat: "CO", sub: "CO5", rev: false },
    { id: 29, text: "나에게는 약점이 너무 많아서 나 자신을 별로 좋아하지 않는다.", cat: "SD", sub: "SD4", rev: true },
    { id: 30, text: "다른 사람들이 기분 좋아지도록 챙기는 편이다.", cat: "RD", sub: "RD1", rev: false },
    { id: 31, text: "잘 모르는 사람들에 대한 자신감이 부족하기 때문에, 낯선 사람 만나는 것을 꺼린다.", cat: "HA", sub: "HA3", rev: false },
    { id: 32, text: "어떤 생각이 떠오르면, 즉시 실행에 옮기고 싶다.", cat: "NS", sub: "NS2", rev: false },
    { id: 33, text: "어떤 결정을 내릴 때, 정의나 정직과 같은 기본적인 것들이 중요한 역할을 한다.", cat: "CO", sub: "CO5", rev: false },
    { id: 34, text: "인생에서 겪는 많은 일들을 이겨낼 수 있는 좋은 습관과 능력을 개발하였다.", cat: "SD", sub: "SD3", rev: false },
    { id: 35, text: "사람들이 나에게 기대하는 것보다 더 많은 것을 성취하는 때가 종종 있다.", cat: "P", sub: "PS3", rev: false },
    { id: 36, text: "나에게 상처를 준 사람에게는 갚아 주려 한다.", cat: "CO", sub: "CO4", rev: true },
    { id: 37, text: "말로 표현할 수는 없지만, 내가 다른 사람들과 영적으로 연결되어 있다고 느낄 때가 있다.", cat: "ST", sub: "ST2", rev: false },
    { id: 38, text: "문제를 어떻게 해결해야 할지 막막하기만 한 때가 자주 있다.", cat: "SD", sub: "SD3", rev: true },
    { id: 39, text: "잘 모르는 사람들에게도 내 자신을 금방 드러내는 편이다.", cat: "RD", sub: "RD2", rev: false },
    { id: 40, text: "어떤 일에 실패하면 더 잘해야겠다고 결심하게 된다.", cat: "P", sub: "PS2", rev: false },
    { id: 41, text: "낯선 사람들을 만날 때, 비록 그들이 우호적이지 않다고 들었어도, 별로 긴장하지 않고 활발하게 행동한다.", cat: "HA", sub: "HA3", rev: true },
    { id: 42, text: "어려운 상황에 부딪치면 이를 도전이나 기회로 받아들이는 편이다.", cat: "SD", sub: "SD3", rev: false },
    { id: 43, text: "돈을 저축하기보다는 있는 대로 쓰는 편이다.", cat: "NS", sub: "NS3", rev: false },
    { id: 44, text: "친구들과 함께 있을 때에도 내 감정을 드러내는 것을 원치 않는다.", cat: "RD", sub: "RD4", rev: true },
    { id: 45, text: "위험을 예측할 수 없을 때에는, 새로운 일을 시도하지 않고 있던 그대로 놔두는 편이다.", cat: "HA", sub: "HA1", rev: false },
    { id: 46, text: "다른 사람에게 잘못을 했거나 실수를 했을 경우, 그것을 사과한다.", cat: "CO", sub: "CO1", rev: false },
    { id: 47, text: "쉽게 지치고 피곤해져서, 힘이 없다고 느껴지는 때가 많다.", cat: "HA", sub: "HA4", rev: false },
    { id: 48, text: "나 자신이 어떤 상위의 존재(예: 인류, 자연)의 일부인 것 같은 분명한 느낌이 들 때가 있다.", cat: "ST", sub: "ST2", rev: false },
    { id: 49, text: "다른 사람을 진심으로 이해하기 위해서 내가 그 사람의 입장이 되어 보려고 노력한다.", cat: "CO", sub: "CO2", rev: false },
    { id: 50, text: "계획했던 일을 추진하기 위해 내 자신의 힘을 한데 모으기 힘들 때가 종종 있다.", cat: "SD", sub: "SD2", rev: true },
    { id: 51, text: "다른 사람들은 시간 낭비라고 생각하는 일이라도, 새로운 일이면 재미 삼아 해본다.", cat: "NS", sub: "NS1", rev: false },
    { id: 52, text: "내 의지와는 상관없이 주변 상황 때문에 어쩔 수 없이 어떤 일을 하게 되는 경우가 종종 있다.", cat: "SD", sub: "SD1", rev: true },
    { id: 53, text: "어떤 방식으로든 나 자신이 나이나 성별, 인종에 관계없이 모든 인류와 연결되어 있다고 느낀다.", cat: "ST", sub: "ST2", rev: false },
    { id: 54, text: "지칠 때까지 내 자신을 몰아붙이거나 내가 실제로 할 수 있는 것 이상으로 노력할 때가 종종 있다.", cat: "P", sub: "PS1", rev: false },
    { id: 55, text: "붙잡혔을 때 그 상황에서 빠져나오기 위해 쉽게 둘러대는 편이다.", cat: "CO", sub: "CO5", rev: true },
    { id: 56, text: "다른 사람의 감정에 귀를 기울이는 편이다.", cat: "RD", sub: "RD1", rev: false },
    { id: 57, text: "첫 시도에서 어떤 일에 성공하지 못하면, 다시 도전하고 싶어진다.", cat: "P", sub: "PS2", rev: false },
    { id: 58, text: "뭔가 갖고 싶은 것이 생기면 당장 가지려고 한다.", cat: "NS", sub: "NS4", rev: false },
    { id: 59, text: "내 방식대로 일을 하고 싶어해서, 다른 사람들과 마찰을 빚거나 안 좋은 분위기를 만들곤 한다.", cat: "CO", sub: "CO1", rev: true },
    { id: 60, text: "다른 사람은 전혀 위험하다고 느끼지 않아도, 낯선 상황에서는 긴장하고 걱하게 된다.", cat: "HA", sub: "HA2", rev: false },
    { id: 61, text: "종종 내가 주변 상황의 희생양이라는 느낌이 든다.", cat: "SD", sub: "SD1", rev: true },
    { id: 62, text: "공평과 진실은 내게 그리 중요하지 않다.", cat: "CO", sub: "CO5", rev: true },
    { id: 63, text: "다른 사람의 생각을 잘 이해하는 편이다.", cat: "RD", sub: "RD1", rev: false },
    { id: 64, text: "새로운 일이나 익숙하지 않은 일을 해야 할 때에는 긴장하고 걱정한다.", cat: "HA", sub: "HA1", rev: false },
    { id: 65, text: "들키지 않을 수만 있다면 법이나 규칙을 어기기도 한다.", cat: "CO", sub: "CO5", rev: true },
    { id: 66, text: "눈에 보이는 듯 생생한 상상을 한다.", cat: "ST", sub: "ST1", rev: false },
    { id: 67, text: "나는 매우 야심적인 사람이다.", cat: "P", sub: "PS3", rev: false },
    { id: 68, text: "모든 생명체를 연결시키는 어떤 초자연적인 힘이 있다고 믿는다.", cat: "ST", sub: "ST3", rev: false },
    { id: 69, text: "삶의 재미를 위해 돈을 쓰기보다는 저축하는 것이 더 좋다.", cat: "NS", sub: "NS3", rev: true },
    { id: 70, text: "어떤 일에 너무 깊이 몰입한 나머지, 시간이 한참 지난 후에야 정신이 드는 것 같은 때가 있다.", cat: "ST", sub: "ST1", rev: false },

// --- 멀티 유저 및 상태 관리 로직 ---
let users = JSON.parse(localStorage.getItem('tci_user_list')) || ["기본사용자"];
let currentUser = localStorage.getItem('tci_current_user') || "기본사용자";

function initApp() {
    renderUserList();
    renderQuestions();
    updateUIForUser();
}

function renderUserList() {
    const sel = document.getElementById('userSelector');
    sel.innerHTML = users.map(u => `<option value="${u}" ${u === currentUser ? 'selected' : ''}>${u}</option>`).join('');
}

function addUser() {
    const name = prompt("새로운 사용자 이름을 입력하세요 (최대 10자):");
    if (name && !users.includes(name)) {
        users.push(name);
        currentUser = name;
        saveUserConfig();
        location.reload();
    } else if (users.includes(name)) {
        alert("이미 존재하는 이름입니다.");
    }
}

function switchUser() {
    currentUser = document.getElementById('userSelector').value;
    saveUserConfig();
    location.reload();
}

function deleteUser() {
    if (users.length <= 1) return alert("최소 한 명의 사용자는 있어야 합니다.");
    if (confirm(`${currentUser} 유저의 모든 데이터를 삭제하시겠습니까?`)) {
        for (let i = 1; i <= 130; i++) {
            localStorage.removeItem(`tci_${currentUser}_q${i}`);
        }
        users = users.filter(u => u !== currentUser);
        currentUser = users[0];
        saveUserConfig();
        location.reload();
    }
}

function saveUserConfig() {
    localStorage.setItem('tci_user_list', JSON.stringify(users));
    localStorage.setItem('tci_current_user', currentUser);
}

function renderQuestions() {
    const qContainer = document.getElementById('questionsContainer');
    qContainer.innerHTML = '';
    tciRawData.forEach(q => {
        const savedVal = localStorage.getItem(`tci_${currentUser}_q${q.id}`);
        const div = document.createElement('div');
        div.className = 'question-card';
        div.innerHTML = `
            <div class="q-text">${q.id}. ${q.text}</div>
            <div class="options">
                ${[0,1,2,3,4].map(v => `
                    <div class="opt-item">
                        <input type="radio" name="q${q.id}" id="q${q.id}_${v}" value="${v}" 
                        ${savedVal === v.toString() ? 'checked' : ''}>
                        <label for="q${q.id}_${v}">${v}</label>
                    </div>
                `).join('')}
            </div>
        `;
        qContainer.appendChild(div);
    });
}

function updateUIForUser() {
    document.getElementById('currentUserDisplay').innerText = `현재 검사자: ${currentUser}`;
    updateProgress();
}

// 실시간 선택 저장
document.getElementById('questionsContainer').addEventListener('change', (e) => {
    if(e.target.type === 'radio') {
        localStorage.setItem(`tci_${currentUser}_${e.target.name}`, e.target.value);
        updateProgress();
    }
});

function updateProgress() {
    const answered = document.querySelectorAll('input[type="radio"]:checked').length;
    document.getElementById('progressBar').style.width = (answered / 130 * 100) + '%';
    document.getElementById('progressText').innerText = `${answered}/130`;
}

function resetCurrentAnswers() {
    if(confirm(`${currentUser}님의 모든 응답을 초기화하시겠습니까?`)) {
        for (let i = 1; i <= 130; i++) {
            localStorage.removeItem(`tci_${currentUser}_q${i}`);
        }
        location.reload();
    }
}

// --- 분석 및 자동 응답 처리 로직 ---
document.getElementById('tciForm').onsubmit = function(e) {
    e.preventDefault();
    
    // 미응답 문항을 찾아 자동으로 2번(중립) 선택
    for (let i = 1; i <= 130; i++) {
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        if (!selected) {
            const defaultOption = document.getElementById(`q${i}_2`);
            if (defaultOption) {
                defaultOption.checked = true;
                localStorage.setItem(`tci_${currentUser}_q${i}`, "2");
            }
        }
    }
    
    updateProgress(); // UI 갱신

    const data = new FormData(this);
    let scores = { main: {}, sub: {} };

    tciRawData.forEach(q => {
        let val = parseInt(data.get(`q${q.id}`));
        if(q.rev) val = 4 - val;
        scores.main[q.cat] = (scores.main[q.cat] || 0) + val;
        scores.sub[q.sub] = (scores.sub[q.sub] || 0) + val;
    });
    renderResult(scores);
};

function renderResult(scores) {
    const mainBody = document.getElementById('mainBody');
    const subBody = document.getElementById('subBody');
    document.getElementById('resultTitle').innerText = `${currentUser}님의 TCI-130 정밀 보고서`;
    document.getElementById('reportDate').innerText = `분석 일시: ${new Date().toLocaleString()}`;
    mainBody.innerHTML = '';
    subBody.innerHTML = '';

    Object.keys(scaleMeta).forEach((key, idx) => {
        const meta = scaleMeta[key];
        const mainScore = scores.main[key] || 0;
        const mainZ = (mainScore - meta.m) / meta.sd;
        const mainPct = Math.round(normalCDF(mainZ) * 100);
        const mainT = Math.round(50 + 10 * mainZ);

        let left = mainPct >= 50 ? 50 : mainPct;
        let width = Math.abs(mainPct - 50);
        mainBody.innerHTML += `
            <tr>
                <td><strong>${idx < 4 ? '기질' : '성격'}</strong></td>
                <td>${meta.label}</td><td>${mainScore}</td><td>${mainT}</td><td>${mainPct}%</td>
                <td><div class="main-bar-wrap"><div class="main-bar-fill" style="left:${left}%; width:${width}%; background:var(--primary);"></div></div></td>
            </tr>
        `;

        meta.subs.forEach(sub => {
            const sScore = scores.sub[sub.id] || 0;
            const sZ = (sScore - sub.m) / sub.sd;
            let dotPos = Math.max(5, Math.min(95, ((sZ + 2) / 4) * 100));
            subBody.innerHTML += `
                <tr>
                    <td>${key}</td><td>${sub.label}</td><td>${sScore}</td>
                    <td style="font-size:0.75rem">${sub.m}(${sub.sd})</td>
                    <td style="color:#888; font-size:0.75rem">${sub.low}</td>
                    <td>
                        <div class="sub-graph-wrap">
                            <div class="sd-zone"></div><div class="center-line"></div>
                            <div class="dot" style="left:${dotPos}%"></div>
                        </div>
                    </td>
                    <td style="color:#888; font-size:0.75rem">${sub.high}</td>
                </tr>
            `;
        });
    });

    document.getElementById('resultView').style.display = 'block';
    window.scrollTo({ top: document.getElementById('resultView').offsetTop, behavior: 'smooth' });
}

function normalCDF(z) {
    let t = 1 / (1 + 0.2316419 * Math.abs(z));
    let d = 0.3989423 * Math.exp(-z * z / 2);
    let p = d * t * (0.3193815 + t * (-0.3565638 + t * (1.781478 + t * (-1.821256 + t * 1.330274))));
    return z > 0 ? 1 - p : p;
}

async function saveImage() {
    const captureArea = document.getElementById('captureArea');
    const canvas = await html2canvas(captureArea, { scale: 2, useCORS: true });
    canvas.toBlob(async (blob) => {
        const file = new File([blob], `${currentUser}_TCI.png`, { type: 'image/png' });
        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({ files: [file], title: `${currentUser} TCI 결과`, text: '보고서' });
        } else {
            const link = document.createElement('a');
            link.download = `${currentUser}_TCI.png`;
            link.href = canvas.toDataURL();
            link.click();
        }
    }, 'image/png');
}

initApp();
</script>
